<!DOCTYPE html>
<html>
<head>
    <title>Service Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial; background: #f5f5f5; }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">
<h2>Service Request Form</h2>

<form id="myForm" action="/submit" method="POST">

<!-- Mobile -->
<input type="tel" name="mobile" id="mobile" placeholder="Mobile Number">
<div class="error" id="mobileError"></div>

<!-- Name -->
<input type="text" name="name" id="name" placeholder="Customer Name">
<div class="error" id="nameError"></div>

<!-- Address -->
<textarea name="address" id="address" placeholder="Address"></textarea>
<div class="error" id="addressError"></div>

<!-- Email -->
<input type="email" name="email" id="email" placeholder="Email">
<div class="error" id="emailError"></div>

<!-- GSTIN -->
<input type="text" name="gstin" id="gstin" placeholder="GSTIN">
<div class="error" id="gstinError"></div>

<!-- Product -->
<select name="product" id="product">
    <option value="">Search Product</option>
    {% for p in products %}
        <option value="{{p}}">{{p}}</option>
    {% endfor %}
</select>
<div class="error" id="productError"></div>

<!-- Qty -->
<input type="number" name="qty" id="qty" value="1" min="1">
<div class="error" id="qtyError"></div>

<!-- Problem -->
<textarea name="problem" id="problem" placeholder="Problem Description"></textarea>
<div class="error" id="problemError"></div>

<!-- Serial -->
<input type="text" name="serial" id="serial" placeholder="Serial Number">
<div class="error" id="serialError"></div>

<!-- Bill -->
<input type="text" name="bill" id="bill" placeholder="Bill Number">
<div class="error" id="billError"></div>

<!-- Date -->
<input type="date" name="date" id="date">
<div class="error" id="dateError"></div>

<!-- Warranty -->
<select name="warranty" id="warranty">
    <option value="">Select Warranty</option>
    <option value="UNDER WARRANTY">UNDER WARRANTY</option>
    <option value="WARRANTY CHARGEABLE">WARRANTY CHARGEABLE</option>
    <option value="OUT OF WARRANTY (CHARGEABLE)">OUT OF WARRANTY (CHARGEABLE)</option>
    <option value="PHYSICAL DAMAGE (CHARGEABLE)">PHYSICAL DAMAGE (CHARGEABLE)</option>
    <option value="WARRANTY PHYSICAL DAMAGE (CHARGEABLE)">WARRANTY PHYSICAL DAMAGE (CHARGEABLE)</option>
    <option value="DOA">DOA</option>
    <option value="WARRANTY SS">WARRANTY SS</option>
    <option value="LFR WARRANTY">LFR WARRANTY</option>
</select>
<div class="error" id="warrantyError"></div>

<button type="submit">Submit</button>

</form>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

<script>
// Select2
$('#product').select2({ width: '100%' });

// Auto date
document.getElementById("date").valueAsDate = new Date();

// Uppercase
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", function () {
        this.value = this.value.toUpperCase();
    });
});

// Validation
document.getElementById("myForm").addEventListener("submit", function(e){

    let valid = true;

    // Clear errors
    document.querySelectorAll(".error").forEach(e => e.innerText="");

    // Mobile
    let mobile = document.getElementById("mobile").value;
    if(!/^[0-9]{10}$/.test(mobile)){
        document.getElementById("mobileError").innerText = "Enter valid 10 digit mobile number";
        valid = false;
    }

    // Name (only letters)
    let name = document.getElementById("name").value;
    if(!/^[A-Z ]+$/.test(name)){
        document.getElementById("nameError").innerText = "Name should contain only letters";
        valid = false;
    }

    // Address
    let address = document.getElementById("address").value;
    if(!/^[A-Z0-9 ,.\n]+$/.test(address)){
        document.getElementById("addressError").innerText = "Only letters, numbers, comma, dot allowed";
        valid = false;
    }

    // Product
    if(document.getElementById("product").value === ""){
        document.getElementById("productError").innerText = "Please select product";
        valid = false;
    }

    // Qty
    if(document.getElementById("qty").value <= 0){
        document.getElementById("qtyError").innerText = "Quantity must be greater than 0";
        valid = false;
    }

    // Problem (only letters)
    let problem = document.getElementById("problem").value;
    if(!/^[A-Z ]+$/.test(problem)){
        document.getElementById("problemError").innerText = "Only letters allowed";
        valid = false;
    }

    // Serial
    let serial = document.getElementById("serial").value;
    if(!/^[A-Z0-9 ]+$/.test(serial)){
        document.getElementById("serialError").innerText = "No special characters allowed";
        valid = false;
    }

    // Bill (required)
    if(document.getElementById("bill").value === ""){
        document.getElementById("billError").innerText = "Bill is required";
        valid = false;
    }

    // Date
    if(document.getElementById("date").value === ""){
        document.getElementById("dateError").innerText = "Select date";
        valid = false;
    }

    // Warranty
    if(document.getElementById("warranty").value === ""){
        document.getElementById("warrantyError").innerText = "Select warranty";
        valid = false;
    }

    if(!valid){
        e.preventDefault();
    }
});
</script>

</body>
</html>
