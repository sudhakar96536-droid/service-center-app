<!DOCTYPE html>
<html>
<head>
    <title>Product Complaint Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 2px solid #ccc;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        h2 { text-align: center; }

        /* PRODUCT BOX */
        .product-box {
            border: 3px solid #28a745;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: #f9fff9;
        }

        /* COURIER BOX */
        #courierBox {
            border: 2px solid orange;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            background: #fff7e6;
            display: none;
        }
        .warning {
            color: red !important;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
        /* DESKTOP SIDE IMAGES */
.side-img {
    position: fixed;
    top: 0;
    width: 30%;
    height: 100vh;
    z-index: -1;
}

.left-img {
    left: 0;
}

.right-img {
    right: 0;
}

.side-img img {
    width: 100%;
    object-fit: contain;   /* prevents zoom/crop */
    transform: scale(0.5); /* reduce to 50% */
}

/* Make sure center stays above */
.container {
    position: relative;
    z-index: 1;
}

/* Hide images on mobile */
@media (max-width: 768px) {
    .side-img {
        display: none;
    }
}
    </style>
</head>

<body>
<!-- LEFT IMAGE -->
<div class="side-img left-img">
    <img src="{{ url_for('static', filename='11.jpg') }}">
</div>

<!-- RIGHT IMAGE -->
<div class="side-img right-img">
    <img src="{{ url_for('static', filename='22.jpg') }}">
</div>
    
<div class="container">

    <div style="text-align:center;">
        <img src="{{ url_for('static', filename='1logo.jpg') }}" style="max-width:120px;">
    </div>

    <h2>Product Complaint Registration</h2>

    <form id="myForm" action="/submit" method="POST" enctype="multipart/form-data">

        <!-- CUSTOMER TYPE -->
        <select name="customer_type" id="customer_type">
            <option value="">Select Customer Type</option>
            <option value="DIRECT CUSTOMER">DIRECT CUSTOMER</option>
            <option value="PARTNERS">PARTNERS</option>
        </select>
        <div class="error" id="customerTypeError"></div>

        <!-- MOBILE -->
        <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number">

        <!-- SEARCH -->
        <input type="tel" id="search_mobile" name="search_mobile" placeholder="Search By Mobile No">

        <!-- NAME -->
        <input type="text" name="name" placeholder="Customer Name">

        <!-- ADDRESS -->
        <input type="text" name="address" placeholder="Address Line 1">
        <input type="text" name="address1" placeholder="Address Line 2">
        <input type="text" name="city" placeholder="City">
        <input type="text" name="pincode" placeholder="Pincode">

        <select name="state">
            <option value="">Select State</option>
            {% for s in states %}
                <option value="{{s}}">{{s}}</option>
            {% endfor %}
        </select>

        <!-- EMAIL / GST -->
        <input type="email" name="email" placeholder="Email">
        <input type="text" name="gstin" placeholder="GSTIN">

        <!-- REMARKS -->
        <input type="text" name="remarks" placeholder="Remarks">

        <hr>

        <!-- PRODUCTS -->
        <h3>Products</h3>
        <div id="productList"></div>

        <button type="button" onclick="addProduct()">+ Add Product</button>

        <hr>

        <!-- SERVICE MODE -->
        <h3>Service Mode</h3>

        <select name="service_mode" id="service_mode">
            <option value="">Select Option</option>
            <option value="SERVICE CENTRE">SERVICE CENTRE</option>
            <option value="COURIER">COURIER</option>
        </select>

        <div id="courierBox">

            <input type="text" name="courier_name" placeholder="Courier Name">
            <input type="text" name="docket_no" placeholder="Courier Docket No">
            <input type="date" name="docket_date" placeholder="Docket Date">
            <input type="number" name="no_boxes" placeholder="No of Boxes">
            <input type="number" name="no_items" placeholder="No of Items">
            <input type="text" name="weight" placeholder="Weight">
            <input type="text" name="courier_remarks" placeholder="Courier Remarks">
            <label>Upload Packed Box Image (Max 1MB)</label>
            <input type="file" name="courier_image" id="courier_image" accept="image/*">
            <div class="error" id="courierFileError"></div>
        </div>

        <br>

        <button type="submit">Submit</button>
        <br>
        <br>
        <button type="button" onclick="confirmReset()" style="background:red;">Reset Form</button>

    </form>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

<script>

function initSelect2() {
    $('.product-select').select2({
        width: '100%',
        placeholder: "Search Product",
        allowClear: true,
        minimumInputLength: 1,
        ajax: {
            url: "/search-products",
            dataType: "json",
            delay: 250,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return { results: data.items };
            }
        }
    });
}

function addProduct() {

    let div = document.createElement("div");
    div.classList.add("product-box");

    div.innerHTML = `
        <select name="product[]" class="product-select" required></select>

        <input type="number" name="qty[]" placeholder="Qty" value="1" min="1" required>
        <input type="text" name="problem[]" placeholder="Problem Description">
        <input type="text" name="serial[]" placeholder="Serial Number">

        <select name="warranty[]">
            <option value="UNDER WARRANTY">UNDER WARRANTY</option>
            <option value="OUT OF WARRANTY">OUT OF WARRANTY</option>
        </select>

        <input type="text" name="bill[]" placeholder="Bill Number">
        <input type="date" name="date[]" required>

        <!-- ✅ NEW -->
        <label>Upload Invoice (Max 1MB)</label>
        <input type="file" name="invoice[]" class="invoice-file" accept="image/*,.pdf">
        <div class="error file-error"></div>


        <button type="button" onclick="this.parentElement.remove()">Remove</button>
    `;

    document.getElementById("productList").appendChild(div);

    initSelect2();
}

    
    function confirmReset() {
        let ok = confirm("Are you sure you want to clear the form?");
    
        if (ok) {
            document.getElementById("myForm").reset();
            document.getElementById("productList").innerHTML = "";
            addProduct();
    }
}


window.onload = function () {
    addProduct();
};

document.getElementById("service_mode").addEventListener("change", function () {
    document.getElementById("courierBox").style.display =
        this.value === "COURIER" ? "block" : "none";
});

document.getElementById("myForm").addEventListener("submit", function(e){

    let ok = confirm("Are you sure you want to submit?");
    if(!ok) e.preventDefault();

});

document.addEventListener("change", function(e) {

    if (e.target.classList.contains("invoice-file")) {

        let file = e.target.files[0];
        let errorDiv = e.target.nextElementSibling;

        if (!file) return;

        if (file.size > 1 * 1024 * 1024) {
            errorDiv.innerText = "Max 1MB only";
            e.target.value = "";
        } else {
            errorDiv.innerText = "";
        }
    }
});

document.getElementById("courier_image").addEventListener("change", function () {

    let file = this.files[0];
    let errorDiv = document.getElementById("courierFileError");

    if (!file) return;

    if (file.size > 1 * 1024 * 1024) {
        errorDiv.innerText = "Max 1MB only";
        this.value = "";
    } else {
        errorDiv.innerText = "";
    }
});
    
</script>

</body>
</html>
