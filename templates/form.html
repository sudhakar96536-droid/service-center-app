<!DOCTYPE html>
<html>
<head>
    <title>Service Request</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Service Request Form</h2>

    <form action="/submit" method="POST">

        <!-- Mobile -->
        <input type="text" name="mobile" placeholder="Mobile Number"
               pattern="[0-9]{10}" maxlength="10"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')"
               required>

        <!-- Name -->
        <input type="text" name="name" class="upper" placeholder="Customer Name" required>

        <!-- Address -->
        <textarea name="address" class="upper" placeholder="Address" required></textarea>

        <!-- Email (optional) -->
        <input type="email" name="email" placeholder="Email">

        <!-- GSTIN (optional) -->
        <input type="text" name="gstin" class="upper" placeholder="GSTIN">

        <!-- Product -->
        <select name="product" id="product" required>
            <option value="">Search Product</option>
            {% for p in products %}
                <option value="{{p}}">{{p}}</option>
            {% endfor %}
        </select>

        <!-- Quantity -->
        <input type="number" name="qty" value="1" min="1" required>

        <!-- Problem -->
        <textarea name="problem" class="upper" placeholder="Problem Description" required></textarea>

        <!-- Serial -->
        <input type="text" name="serial" class="upper" placeholder="Serial Number" required>

        <!-- Bill -->
        <input type="text" name="bill" placeholder="Bill Number" required>

        <!-- Date -->
        <input type="date" name="date" id="date" required onkeydown="return false">

        <!-- Warranty -->
        <select name="warranty" required>
            <option value="">Select Warranty</option>
            <option value="IN">IN WARRANTY</option>
            <option value="OUT">OUT OF WARRANTY</option>
        </select>

        <button type="submit">Submit</button>

    </form>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

<script>
    // Select2 dropdown
    $('#product').select2({
        width: '100%',
        placeholder: "Search your product"
    });

    // Uppercase auto
    document.querySelectorAll('.upper').forEach(el => {
        el.addEventListener('input', function () {
            this.value = this.value.toUpperCase();
        });
    });

    // Set today date
    document.getElementById("date").valueAsDate = new Date();

    // Custom validation message
    document.querySelectorAll("input, textarea, select").forEach(el => {
        el.addEventListener("invalid", function () {
            this.setCustomValidity("This field is mandatory");
        });

        el.addEventListener("input", function () {
            this.setCustomValidity("");
        });
    });
</script>

</body>
</html>
