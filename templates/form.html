<!DOCTYPE html>
<html>
<head>
    <title>Product Complaint Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial; background: #f5f5f5; }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        h2 { text-align: center; }

        .product-box {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <div style="text-align:center;">
        <img src="{{ url_for('static', filename='1logo.jpg') }}" style="max-width:120px;">
    </div>

    <h2>Product Complaint Registration</h2>

<form id="myForm" action="/submit" method="POST">

<!-- CUSTOMER TYPE -->
<label><b>Customer Type</b></label>
<select name="customer_type" id="customer_type">
    <option value="">Select Customer Type</option>
    <option value="DIRECT CUSTOMER">DIRECT CUSTOMER</option>
    <option value="PARTNERS">PARTNERS</option>
</select>
<div class="error" id="customerTypeError"></div>

<!-- MOBILE SEARCH -->
<input type="tel" id="search_mobile" name="search_mobile" placeholder="Search By Mobile No">
<div class="error" id="searchMobileError"></div>

<!-- MOBILE -->
<input type="tel" id="mobile" name="mobile" placeholder="Mobile Number">
<div class="error" id="mobileError"></div>

<!-- NAME -->
<input type="text" id="name" name="name" placeholder="Customer Name">

<!-- ADDRESS -->
<input type="text" name="address" id="address" placeholder="Address Line 1">
<input type="text" name="address1" id="address1" placeholder="Address Line 2">
<input type="text" name="city" id="city" placeholder="City">
<input type="text" name="pincode" id="pincode" placeholder="Pincode">

<select name="state" id="state">
    <option value="">Select State</option>
    {% for s in states %}
        <option value="{{s}}">{{s}}</option>
    {% endfor %}
</select>

<!-- EMAIL / GST -->
<input type="email" name="email" placeholder="Email">
<input type="text" name="gstin" placeholder="GSTIN">

<!-- REMARKS -->
<input type="text" name="remarks" placeholder="Remarks">
    
<!-- PRODUCTS SECTION -->
<h3>Products</h3>
<div id="productList"></div>
<button type="button" onclick="addProduct()">+ Add Product</button>



<button type="submit">Submit</button>

</form>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

// AUTO UPPERCASE
document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", function () {
        this.value = this.value.toUpperCase();
    });
});


// =====================
// ADD PRODUCT BLOCK
// =====================
function addProduct() {

    let div = document.createElement("div");
    div.classList.add("product-box");

    div.innerHTML = `
        <select name="product[]" required>
            <option value="">Select Product</option>
            {% for p in products %}
                <option value="{{p}}">{{p}}</option>
            {% endfor %}
        </select>

        <input type="number" name="qty[]" value="1" min="1" required placeholder="Qty">

        <input type="text" name="problem[]" required placeholder="Problem Description">

        <input type="text" name="serial[]" placeholder="Serial Number">

        <select name="warranty[]" required>
            <option value="">Select Warranty</option>
            <option value="UNDER WARRANTY">UNDER WARRANTY</option>
            <option value="OUT OF WARRANTY (CHARGEABLE)">OUT OF WARRANTY</option>
        </select>

        <input type="text" name="bill[]" placeholder="Bill Number">

        <input type="date" name="date[]" required>

        <button type="button" onclick="this.parentElement.remove()">Remove</button>
    `;

    document.getElementById("productList").appendChild(div);
}


// AUTO FIRST PRODUCT
window.onload = function () {
    addProduct();
};


// =====================
// VALIDATION
// =====================
document.getElementById("myForm").addEventListener("submit", function(e){

    let valid = true;
    document.querySelectorAll(".error").forEach(e => e.innerText="");

    if(document.getElementById("customer_type").value === ""){
        document.getElementById("customerTypeError").innerText = "Select customer type";
        valid = false;
    }

    let mobile = document.getElementById("mobile").value;
    if(!/^[0-9]{10}$/.test(mobile)){
        document.getElementById("mobileError").innerText = "Enter valid 10 digit mobile number";
        valid = false;
    }

    let search_mobile = document.getElementById("search_mobile").value;
    if(search_mobile !== "" && !/^[0-9]{10}$/.test(search_mobile)){
        document.getElementById("searchMobileError").innerText = "Enter valid 10 digit mobile number";
        valid = false;
    }

    if(document.getElementById("productList").children.length === 0){
        alert("Please add at least one product");
        valid = false;
    }

    if(!valid){
        e.preventDefault();
    }
});

</script>

</body>
</html>
