<!DOCTYPE html>
<html>
<head>
    <title>Product Complaint Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial; background: #f5f5f5; }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        h2 { text-align: center; }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div style="text-align:center; margin-bottom:10px;">
        <img src="{{ url_for('static', filename='1logo.jpg') }}" style="max-width:120px;">
    </div>

    <h2>Product Complaint Registration</h2>

<form id="myForm" action="/submit" method="POST">


<label style="font-weight:bold;">Customer Type:</label>

<!-- customer_type -->
<select name="customer_type" id="customer_type">
    <option value="">Select Customer Type</option>
    <option value="DIRECT CUSTOMER">DIRECT CUSTOMER</option>
    <option value="PARTNERS">PARTNERS</option>
</select>

<div class="error" id="customerTypeError"></div>
    
<!-- Search By Mobile No -->
<input type="tel" id="search_mobile" name="search_mobile" placeholder="Search By Mobile No">
<div class="error" id="searchMobileError"></div>

    
<!-- Mobile -->
<input type="tel" id="mobile" name="mobile" placeholder="Mobile Number">
<div class="error" id="mobileError"></div>

<!-- Name -->
<input type="text" id="name" name="name" placeholder="Customer Name">
<div class="error" id="nameError"></div>

<!-- Address -->
<textarea id="address" name="address" placeholder="Address"></textarea>
<div class="error" id="addressError"></div>

<!-- Email -->
<input type="email" id="email" name="email" placeholder="Email">

<!-- GSTIN -->
<input type="text" id="gstin" name="gstin" placeholder="GSTIN">

<!-- Product -->
<select name="product" id="product">
    <option value="">Search Product</option>
    {% for p in products %}
        <option value="{{p}}">{{p}}</option>
    {% endfor %}
</select>
<div class="error" id="productError"></div>

<!-- Qty -->
<input type="number" id="qty" name="qty" value="1" min="1">
<div class="error" id="qtyError"></div>

<!-- Problem -->
<textarea id="problem" name="problem" placeholder="Problem Description"></textarea>
<div class="error" id="problemError"></div>

<!-- Serial -->
<input type="text" id="serial" name="serial" placeholder="Serial Number">
<div class="error" id="serialError"></div>

<!-- Bill -->
<input type="text" id="bill" name="bill" placeholder="Bill Number">
<div class="error" id="billError"></div>

<!-- ✅ BILL DATE FIX -->
<label style="font-weight:bold;">Bill Date (Purchase Date):</label>
<input type="date" name="date" id="date">
<small style="color:gray;">Select the date from your purchase bill</small>
<div class="error" id="dateError"></div>

<!-- Warranty -->
<select name="warranty" id="warranty">
    <option value="">Select Warranty</option>
    <option value="UNDER WARRANTY">UNDER WARRANTY</option>
    <option value="WARRANTY CHARGEABLE">WARRANTY CHARGEABLE</option>
    <option value="OUT OF WARRANTY (CHARGEABLE)">OUT OF WARRANTY (CHARGEABLE)</option>
    <option value="PHYSICAL DAMAGE (CHARGEABLE)">PHYSICAL DAMAGE (CHARGEABLE)</option>
    <option value="WARRANTY PHYSICAL DAMAGE (CHARGEABLE)">WARRANTY PHYSICAL DAMAGE (CHARGEABLE)</option>
    <option value="DOA">DOA</option>
    <option value="WARRANTY SS">WARRANTY SS</option>
    <option value="LFR WARRANTY">LFR WARRANTY</option>
</select>
<div class="error" id="warrantyError"></div>

<button type="submit">Submit</button>

</form>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

<script>

// Select2
$('#product').select2({ width: '100%' });

// Uppercase
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", function () {
        this.value = this.value.toUpperCase();
    });
});

// Validation
document.getElementById("myForm").addEventListener("submit", function(e){

    let valid = true;
    document.querySelectorAll(".error").forEach(e => e.innerText="");
    let search_mobile = document.getElementById("search_mobile").value;

    // search_mobile
    if(search_mobile !== "" && !/^[0-9]{10}$/.test(search_mobile)){
    document.getElementById("searchMobileError").innerText = "Enter valid 10 digit mobile number";
    valid = false;
    }
    
    // Mobile
    let mobile = document.getElementById("mobile").value;
    if(!/^[0-9]{10}$/.test(mobile)){
        document.getElementById("mobileError").innerText = "Enter valid 10 digit mobile number";
        valid = false;
    }

    // Name
    let name = document.getElementById("name").value;
    if(!/^[A-Z ]+$/.test(name)){
        document.getElementById("nameError").innerText = "Only letters allowed";
        valid = false;
    }

    // Address
    let address = document.getElementById("address").value;
    if(!/^[A-Z0-9 ,.\n]+$/.test(address)){
        document.getElementById("addressError").innerText = "Only letters, numbers, comma, dot allowed";
        valid = false;
    }

    // Product
    if(document.getElementById("product").value === ""){
        document.getElementById("productError").innerText = "Select product";
        valid = false;
    }

    // Problem
    let problem = document.getElementById("problem").value;
    if(!/^[A-Z ]+$/.test(problem)){
        document.getElementById("problemError").innerText = "Only letters allowed";
        valid = false;
    }
    // Customer Type
    if(document.getElementById("customer_type").value === ""){
    document.getElementById("customerTypeError").innerText = "Select customer type";
    valid = false;
    }
    // Date
    if(document.getElementById("date").value === ""){
        document.getElementById("dateError").innerText = "Select bill date";
        valid = false;
    }

    if(!valid){
        e.preventDefault();
    }
});

</script>

</body>
</html>
